services:
  - type: web
    name: tatweer-shipment-track
    env: node
    plan: free
    buildCommand: "echo Render build complete"
    startCommand: "node server.js"
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: STORAGE_DRIVER
        value: supabase
      - key: DATA_FILE_PATH
        value: ./data/shipments.json
      - key: SUGGESTIONS_FILE_PATH
        value: ./data/suggestions.json
      - key: DATABASE_FILE_PATH
        value: ./data/tatweer-tracking.sqlite
      - key: AUDIT_LOG_FILE_PATH
        value: ./data/audit-log.jsonl
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TRACKING_BASE_URL
        value: ""
      - key: ALLOWED_ORIGINS
        value: ""
      - key: WHATSAPP_PROVIDER
        value: mock
